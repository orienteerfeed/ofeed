services:
  api:
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.api.rule=Host(`${API_HOST:-api.ofeed.local}`)
      - traefik.http.routers.api.entrypoints=${TRAEFIK_ENTRYPOINT:-https}
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.api.loadbalancer.server.port=${SERVER_PORT:-3001}
      - traefik.http.middlewares.api-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.api-redirect.redirectscheme.permanent=true
      - traefik.http.routers.api.middlewares=api-redirect
    networks:
      - app-network
      - traefik
  frontend:
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.frontend.rule=Host(`${FRONTEND_HOST:-ofeed.local}`)
      - traefik.http.routers.frontend.entrypoints=${TRAEFIK_ENTRYPOINT:-https}
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.frontend.loadbalancer.server.port=80
      - traefik.http.middlewares.frontend-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.frontend-redirect.redirectscheme.permanent=true
      - traefik.http.routers.frontend.middlewares=frontend-redirect
    networks:
      - app-network
      - traefik
  board:
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.board.rule=Host(`${BOARD_HOST:-board.ofeed.local}`)
      - traefik.http.routers.board.entrypoints=${TRAEFIK_ENTRYPOINT:-https}
      - traefik.http.routers.board.tls=true
      - traefik.http.routers.board.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.board.loadbalancer.server.port=80
      - traefik.http.middlewares.board-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.board-redirect.redirectscheme.permanent=true
      - traefik.http.routers.board.middlewares=board-redirect
    networks:
      - app-network
      - traefik

networks:
  traefik:
    name: traefik
    external: true
