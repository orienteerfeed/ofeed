name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - package.json
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type to publish
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-release-intent:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      release_level: ${{ steps.resolve.outputs.release_level }}
      release_reason: ${{ steps.resolve.outputs.release_reason }}

    steps:
      - name: Resolve release intent
        id: resolve
        uses: actions/github-script@v7
        env:
          WORKFLOW_RELEASE_TYPE: ${{ github.event.inputs.release_type || '' }}
        with:
          script: |
            const priority = { patch: 1, minor: 2, major: 3 };
            const reasons = [];
            let releaseLevel = "";

            const pickReleaseLevel = (candidate, reason) => {
              if (!candidate) {
                return;
              }

              const normalized = candidate.trim().toLowerCase();

              if (!priority[normalized]) {
                core.setFailed(`Unsupported release level: ${candidate}`);
                return;
              }

              if (!releaseLevel || priority[normalized] > priority[releaseLevel]) {
                releaseLevel = normalized;
              }

              reasons.push(reason);
            };

            const extractLevels = (text) => {
              const levels = [];
              const markerRegex = /\[(?:release|version):\s*(patch|minor|major)\]/gim;
              const trailerRegex = /(?:^|\n)Release-Type:\s*(patch|minor|major)\s*$/gim;

              for (const regex of [markerRegex, trailerRegex]) {
                let match;

                while ((match = regex.exec(text)) !== null) {
                  levels.push(match[1].toLowerCase());
                }
              }

              return levels;
            };

            const workflowReleaseType = process.env.WORKFLOW_RELEASE_TYPE?.trim();
            pickReleaseLevel(workflowReleaseType, `workflow_dispatch requested ${workflowReleaseType}`);

            if (context.eventName === "push") {
              const commits = context.payload.commits ?? [];

              for (const commit of commits) {
                const commitSha = commit.id?.slice(0, 7) ?? "unknown";
                const commitMessage = commit.message ?? "";

                for (const level of extractLevels(commitMessage)) {
                  pickReleaseLevel(level, `commit ${commitSha} requested ${level}`);
                }
              }

              const prNumbers = new Set();

              for (const commit of commits) {
                try {
                  const pullRequests = await github.paginate(
                    "GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls",
                    {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      commit_sha: commit.id,
                      mediaType: {
                        previews: ["groot"],
                      },
                    },
                  );

                  for (const pullRequest of pullRequests) {
                    prNumbers.add(pullRequest.number);
                  }
                } catch (error) {
                  core.warning(
                    `Unable to resolve pull requests for commit ${commit.id?.slice(0, 7) ?? "unknown"}: ${error.message}`,
                  );
                }
              }

              for (const pullRequestNumber of prNumbers) {
                try {
                  const { data: pullRequest } = await github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pullRequestNumber,
                  });

                  const labels = pullRequest.labels
                    .map((label) => typeof label === "string" ? label : label.name)
                    .filter(Boolean);

                  for (const label of labels) {
                    const match = /^release:(patch|minor|major)$/i.exec(label);

                    if (match) {
                      pickReleaseLevel(
                        match[1],
                        `pull request #${pullRequestNumber} has label ${label}`,
                      );
                    }
                  }
                } catch (error) {
                  core.warning(`Unable to load pull request #${pullRequestNumber}: ${error.message}`);
                }
              }
            }

            const shouldRelease = releaseLevel ? "true" : "false";
            const releaseReason = reasons[0] ?? "no explicit release intent found";

            core.info(
              shouldRelease === "true"
                ? `Release requested: ${releaseLevel} (${releaseReason})`
                : "No explicit release intent found. Skipping release.",
            );

            core.setOutput("should_release", shouldRelease);
            core.setOutput("release_level", releaseLevel);
            core.setOutput("release_reason", releaseReason);

  release:
    needs: resolve-release-intent
    if: ${{ needs.resolve-release-intent.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Announce release
        run: |
          echo "Release level: ${{ needs.resolve-release-intent.outputs.release_level }}"
          echo "Reason: ${{ needs.resolve-release-intent.outputs.release_reason }}"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          SEMANTIC_RELEASE_FORCE_LEVEL: ${{ needs.resolve-release-intent.outputs.release_level }}
        run: pnpm exec semantic-release
